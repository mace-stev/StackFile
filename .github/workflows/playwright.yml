name: Playwright Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website_tests/package-lock.json

      - name: Install deps
        working-directory: website_tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: website_tests
        run: npx playwright install --with-deps

      - name: Run tests
        working-directory: website_tests
        run: npx playwright test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website_tests/playwright-report
          retention-days: 7